name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: test "v$(node -p "require('./package.json').version")" = "$GITHUB_REF_NAME"

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run enterprise release gate
        run: npm run verify:enterprise

      - name: Build release artifacts
        shell: bash
        run: |
          tar -czf site.tar.gz -C dist .
          npm sbom --sbom-format cyclonedx > sbom.cdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" site.tar.gz sbom.cdx.json --verify-tag --generate-notes
