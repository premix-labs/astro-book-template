name: Roll Back GitHub Pages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Signed-off tag or commit to restore
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate immutable release reference
        shell: bash
        env:
          REF: ${{ inputs.ref }}
        run: |
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ && ! "$REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ref must be a semantic version tag or full commit SHA" >&2
            exit 1
          fi

      - name: Checkout requested release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Configure Astro public URL
        shell: bash
        run: |
          echo "SITE=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_ENV"
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          fi

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify selected release with enterprise gates
        run: npm run verify:enterprise

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy selected release
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
