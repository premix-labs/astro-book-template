version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
    groups:
      astro-toolchain:
        patterns: ['astro', '@astrojs/*']
      quality-toolchain:
        patterns: ['eslint*', 'prettier*', '@playwright/*', '@axe-core/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:15'
      timezone: Asia/Bangkok
    open-pull-requests-limit: 5
